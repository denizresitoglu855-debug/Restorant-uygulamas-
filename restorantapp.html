<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezzet Dünyası Restoranı</title>
    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #2f3542;
            --light-color: #f1f2f6;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--light-color);
            color: var(--secondary-color);
        }
        header {
            background-color: var(--secondary-color);
            color: white;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
        }
        .cart-icon {
            cursor: pointer;
            position: relative;
            background: var(--primary-color);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: white;
            overflow-x: auto;
        }
        .category-btn {
            padding: 8px 16px;
            border: none;
            background: var(--light-color);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .category-btn.active, .category-btn:hover {
            background: var(--primary-color);
            color: white;
        }
        .menu-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .menu-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .menu-item-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .menu-item-title {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .menu-item-desc {
            font-size: 0.9rem;
            color: #747d8c;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .menu-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.2rem;
        }
        .add-to-cart {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .add-to-cart:hover {
            background: var(--primary-color);
        }
        /* Sepet Bölümü */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 101;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--light-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .close-cart {
            font-size: 1.5rem;
            cursor: pointer;
        }
        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }
        .cart-product {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--light-color);
        }
        .cart-product-info h4 {
            font-size: 0.95rem;
        }
        .cart-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-controls button {
            background: var(--light-color);
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }
        .cart-total-section {
            border-top: 2px solid var(--light-color);
            padding-top: 15px;
        }
        .total-price-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .checkout-btn {
            width: 100%;
            background: #2ed573;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .checkout-btn:hover {
            background: #26af5f;
        }
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
        }
        .backdrop.show {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>🍔 Lezzet Dünyası</h1>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 Sepet (<span id="cart-count">0</span>)
        </div>
    </header>

    <div class="categories">
        <button class="category-btn active" onclick="filterCategory('all', this)">Tümü</button>
        <button class="category-btn" onclick="filterCategory('burger', this)">Burgerler</button>
        <button class="category-btn" onclick="filterCategory('pizza', this)">Pizzalar</button>
        <button class="category-btn" onclick="filterCategory('tatli', this)">Tatlılar</button>
    </div>

    <main class="menu-container" id="menu-list"></main>

    <div class="backdrop" id="backdrop" onclick="toggleCart()"></div>
    
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Siparişiniz</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items" id="cart-items-list">
            <!-- Sepet elemanları JavaScript ile buraya gelecek -->
        </div>
        <div class="cart-total-section">
            <div class="total-price-row">
                <span>Toplam:</span>
                <span id="total-price">0.00 TL</span>
            </div>
            <button class="checkout-btn" onclick="sendOrder()">WhatsApp ile Sipariş Ver</button>
        </div>
    </div>

    <script>
        // Restoran Menü Verileri
        const menuProducts = [
            { id: 1, name: "Klasik Burger", category: "burger", price: 180, desc: "Dana köfte, marul, domates, turşu ve özel burger sosu." },
            { id: 2, name: "Cheeseburger", category: "burger", price: 195, desc: "Klasik burger lezzetine erimiş cheddar peyniri eşliği." },
            { id: 3, name: "Margarita Pizza", category: "pizza", price: 220, desc: "Özel domates sosu, mozzarella peyniri ve taze fesleğen." },
            { id: 4, name: "Karışık Pizza", category: "pizza", price: 260, desc: "Sucuk, salam, sosis, mantar, mısır ve zeytin." },
            { id: 5, name: "Çikolatalı Sufle", category: "tatli", price: 110, desc: "Akışkan sıcak çikolata dolgulu enfes Fransız tatlısı." },
            { id: 6, name: "Tiramisu", category: "tatli", price: 125, desc: "Kedidili bisküvi, espresso ve özel mascarpone kreması." }
        ];

        let cart = [];

        // Menüyü Ekrana Basma
        function displayMenu(products) {
            const menuList = document.getElementById('menu-list');
            menuList.innerHTML = products.map(product => `
                <div class="menu-item">
                    <div class="menu-item-info">
                        <h3 class="menu-item-title">${product.name}</h3>
                        <p class="menu-item-desc">${product.desc}</p>
                        <div class="menu-item-footer">
                            <span class="price">${product.price} TL</span>
                            <button class="add-to-cart" onclick="addToCart(${product.id})">Sepete Ekle</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Kategori Filtreleme
        function filterCategory(category, button) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            
            if(category === 'all') {
                displayMenu(menuProducts);
            } else {
                const filtered = menuProducts.filter(p => p.category === category);
                displayMenu(filtered);
            }
        }

        // Sepet Aç/Kapat
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('backdrop').classList.toggle('show');
        }
